  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Headshot image load failures are expected (blocked CDN / 404) and must not be logged.
    if (e.target && e.target.tagName === 'IMG') return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Orbitron';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"d77b3672-7f5d-44a3-abc5-0dd4c38c17f2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Permanent Marker';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5ed5c687-6761-4196-af7b-da6977eaa9bc\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#05070a;\n    --panel:#0a0e13;\n    --panel-2:#0c1218;\n    --line:rgba(var(--grgb),.16);\n    --line-2:rgba(var(--grgb),.30);\n    --grgb:84,240,176;\n    --grn:#54f0b0;\n    --grn-hot:#7dffcb;\n    --grn-dim:#2e6f57;\n    --amb:#ffc24a;\n    --org:#ff7a29;\n    --red:#ff4d3d;\n    --ink:#dfeee8;\n    --dim:#6d8079;\n    --faint:#455650;\n    --mono:'JetBrains Mono',ui-monospace,monospace;\n    --disp:'Archivo',system-ui,sans-serif;\n    /* wordmark (AtomBets logo) — tweakable via the panel */\n    --wm-font:'Orbitron',sans-serif;\n    --wm-weight:800;\n    --wm-spacing:.02em;\n    --wm-size:26px;\n  }\n  *{margin:0;padding:0;box-sizing:border-box}\n  html,body{background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}\n  body{\n    min-height:100dvh;\n    background:\n      radial-gradient(120% 70% at 50% -10%, rgba(var(--grgb),.10), transparent 60%),\n      radial-gradient(90% 60% at 50% 120%, rgba(255,122,41,.08), transparent 55%),\n      var(--bg);\n    padding:0 0 140px;\n    overflow-x:hidden;\n  }\n  /* CRT scanlines + subtle flicker + vignette overlays */\n  .crt, .crt::before, .crt::after{pointer-events:none}\n  .scan{position:fixed;inset:0;z-index:90;pointer-events:none;\n    background:repeating-linear-gradient(180deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);\n    mix-blend-mode:multiply;opacity:.55}\n  .sweep{position:fixed;left:0;right:0;height:180px;z-index:91;pointer-events:none;\n    background:linear-gradient(180deg, transparent, rgba(var(--grgb),.05) 45%, rgba(var(--grgb),.09) 50%, transparent);\n    animation:sweep 7s linear infinite}\n  @keyframes sweep{0%{top:-200px}100%{top:100%}}\n  .vig{position:fixed;inset:0;z-index:92;pointer-events:none;\n    box-shadow:inset 0 0 200px rgba(0,0,0,.7), inset 0 0 60px rgba(0,0,0,.5);\n    animation:flick 6s steps(60) infinite}\n  @keyframes flick{0%,97%,100%{opacity:1}98%{opacity:.86}99%{opacity:.94}}\n  @media (prefers-reduced-motion: reduce){ .sweep,.vig{animation:none} .core{animation:none} }\n\n  .frame{max-width:480px;margin:0 auto;padding:0 14px}\n\n  /* ---------- top rail: ticker ---------- */\n  .rail{position:sticky;top:0;z-index:80;background:linear-gradient(180deg,#070a0d,rgba(7,10,13,.86));\n    border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}\n  .rail-in{max-width:480px;margin:0 auto;display:flex;align-items:center;gap:10px;height:30px;overflow:hidden}\n  .rail-tag{flex:none;font-size:9px;font-weight:700;letter-spacing:.14em;color:#05070a;\n    background:var(--grn);padding:3px 8px;margin-left:8px;border-radius:2px;text-shadow:none}\n  .ticker{flex:1;overflow:hidden;white-space:nowrap;-webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 92%,transparent)}\n  .ticker span{display:inline-block;padding-left:100%;animation:tick 26s linear infinite;font-size:11px;letter-spacing:.02em;color:var(--dim)}\n  .ticker b{color:var(--ink)}\n  .up{color:var(--grn)} .dn{color:var(--org)}\n  @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}\n\n  /* ---------- header / reactor core ---------- */\n  header.hd{display: ne}\n  .br::after{bottom:-1px;right:-1px;border-left:none;border-top:none}\n\n  .plabel{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.16em;color:var(--grn-dim);\n    text-transform:uppercase;margin-bottom:11px}\n  .plabel::before{content:\"▸\";color:var(--grn)}\n  .plabel .hr{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--line) 0 4px,transparent 4px 8px)}\n  .plabel .n{color:var(--faint);letter-spacing:.1em}\n\n  /* league channel selector */\n  .chans{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin:0 -2px 14px;scrollbar-width:none}\n  .chans::-webkit-scrollbar{display:none}\n  .chan{flex:none;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--dim);\n    background:#070b0e;border:1px solid var(--line);border-radius:3px;padding:9px 13px;cursor:pointer;white-space:nowrap;\n    transition:.14s;position:relative}\n  .chan:hover{color:var(--ink);border-color:var(--line-2)}\n  .chan[aria-pressed=\"true\"]{color:#05070a;background:var(--grn);border-color:var(--grn);\n    box-shadow:0 0 14px rgba(var(--grgb),.4);font-weight:700}\n  .chan .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;margin-right:6px;vertical-align:1px}\n  .chan[aria-pressed=\"true\"] .dot{opacity:1}\n\n  /* legs stepper + today, one row */\n  .rowline{display:flex;gap:10px;margin-bottom:14px}\n  .cell{flex:1;background:#070b0e;border:1px solid var(--line);border-radius:3px;padding:10px 11px}\n  .cell .k{font-size:9px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-bottom:8px}\n  .stepper{display:flex;align-items:center;justify-content:space-between}\n  .stepper button{width:26px;height:26px;border:1px solid var(--line-2);background:#0a0f13;color:var(--grn);\n    font-family:var(--mono);font-size:15px;border-radius:3px;cursor:pointer;line-height:1;transition:.12s}\n  .stepper button:hover{background:var(--grn);color:#05070a;box-shadow:0 lass=\"pctsign\">%<\u002Fspan><span class=\"conf\">High confidence<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pk-form\">\n      <span class=\"spark\"><i style=\"height:100%\"><\u002Fi><i style=\"height:100%\"><\u002Fi><i style=\"height:50%\"><\u002Fi><i style=\"height:100%\"><\u002Fi><i style=\"height:75%\"><\u002Fi><\u002Fspan>\n      <span class=\"fl\">Last 5: 1,2,0,1,1 · steals in 4 of 5<\u002Fspan>\n    <\u002Fdiv>\n    <button class=\"decode\">Reasoning<\u002Fbutton>\n    <div class=\"reason\">\n      <span class=\"rk\">The read<\u002Fspan>\n      Elite sprint speed vs a slow-to-plate battery and a catcher in the bottom decile on pop time. Gets on base often enough that one bag is close to a coin-flip-plus.\n      <div class=\"risk\">⚠ key risk // game script — if CIN trails late, running lanes shrink.<\u002Fdiv>\n      <div class=\"ask\">\n        <div class=\"ask-thread\"><\u002Fdiv>\n        <form class=\"ask-form\"><input class=\"ask-input\" type=\"text\" autocomplete=\"off\" placeholder=\"ask about this pick…\"><button type=\"submit\" class=\"ask-send\">Ask<\u002Fbutton><\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- leans/passes behind toggle -->\n  <button class=\"showall\" id=\"showall\">▾ Show leans &amp; passes <span class=\"cnt\">[ 4 filtered ]<\u002Fspan><\u002Fbutton>\n  <div class=\"denser\" id=\"denser\">\n    <div class=\"drow\"><span class=\"di\">03<\u002Fspan><span class=\"dn\">Shohei Ohtani <small>Hits + Runs + RBIs · Over 2.5<\u002Fsmall><\u002Fspan><span class=\"dv lean\">LEAN<\u002Fspan><span class=\"dp md\">58%<\u002Fspan><\u002Fdiv>\n    <div class=\"drow\"><span class=\"di\">04<\u002Fspan><span class=\"dn\">Bobby Witt Jr. <small>Total Bases · Over 1.5<\u002Fsmall><\u002Fspan><span class=\"dv lean\">LEAN<\u002Fspan><span class=\"dp md\">55%<\u002Fspan><\u002Fdiv>\n    <div class=\"drow\"><span class=\"di\">05<\u002Fspan><span class=\"dn\">Gunnar Henderson <small>Runs · Over 0.5<\u002Fsmall><\u002Fspan><span class=\"dv pass\">PASS<\u002Fspan><span class=\"dp lo\">49%<\u002Fspan><\u002Fdiv>\n    <div class=\"drow\"><span class=\"di\">06<\u002Fspan><span class=\"dn\">Corbin Carroll <small>Stolen Bases · Over 0.5<\u002Fsmall><\u002Fspan><span class=\"dv pass\">PASS<\u002Fspan><span class=\"dp lo\">46%<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /results -->\n  <\u002Fdiv><!-- /tabSearch -->\n\n  <!-- Today's Picks ledger tab -->\n  <div id=\"tabToday\" class=\"tabpanel\" role=\"tabpanel\" hidden=\"\">\n    <div class=\"ledger-hd\">\n      <span id=\"ledgerDate\">Today's ledger<\u002Fspan>\n      <button type=\"button\" class=\"lg-refresh\" id=\"ledgerRefresh\">↻ refresh<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ledger\" id=\"ledger\">\n      <div class=\"ldr-empty\">Open a slate to build today's ledger.<br><b>Run a slate<\u002Fb> to see graded plays here.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"devlinks\">\n    <a href=\"/api/calibration\">◇ Calibration<\u002Fa>\n    <a href=\"/api/top-picks\">◇ Ledger<\u002Fa>\n    <a href=\"/api/dev\">◇ Dev Console<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"foot\">\n    ATOMBETS TERMINAL <b>v0.9<\u002Fb> // EXPERIMENTAL BUILD<br>\n    not advice — track your own slips<span class=\"cursor\"><\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- build-my-own slip tray (global; survives league switches + runs) -->\n<div id=\"slipTray\">\n  <div class=\"slip-in\">\n    <div class=\"slip-bar\" id=\"slipBar\">\n      <span class=\"sb-ic\">▦<\u002Fspan>\n      <span class=\"sb-t\" id=\"slipTitle\">My Slip <span>· 0 legs<\u002Fspan><\u002Fspan>\n      <span class=\"sb-ev\" id=\"slipEv\"><\u002Fspan>\n      <span class=\"sb-car\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"slip-body\">\n      <div class=\"slip-legs\" id=\"slipLegs\"><\u002Fdiv>\n      <div class=\"slip-size\" id=\"slipSize\" hidden=\"\">\n        <div class=\"sz\"><span>Flex EV/$<\u002Fspan><b id=\"slFlexEv\">—<\u002Fb><\u002Fdiv>\n        <div class=\"sz\"><span>Power EV/$<\u002Fspan><b class=\"amb\" id=\"slPowerEv\">—<\u002Fb><\u002Fdiv>\n        <div class=\"sz\"><span>Combined<\u002Fspan><b id=\"slCombined\">—<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slip-dist\" id=\"slipDist\" hidden=\"\"><\u002Fdiv>\n      <div class=\"slip-foot\">\n        <button type=\"button\" class=\"slip-clear\" id=\"slipClear\">✕ clear slip<\u002Fbutton>\n        <span class=\"slip-note\">session only · combine leagues freely<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"tw\">\n  <button id=\"tw-toggle\" aria-label=\"Tweaks\" title=\"Tweaks\">✦<\u002Fbutton>\n  <div id=\"tw-panel\">\n    <div class=\"tw-h\">Tweaks <span>// terminal<\u002Fspan><\u002Fdiv>\n    <div class=\"tw-sec\"><div class=\"tw-label\">Accent<\u002Fdiv><div class=\"tw-swatches\" id=\"tw-accent\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"tw-sec\"><div class=\"tw-label\">Wordmark<\u002Fdiv><div class=\"tw-seg\" id=\"tw-wmfont\"><button data-v=\"orbitron\" title=\"Orbitron\">Reactor<\u002Fbutton><button data-v=\"chakra\" title=\"Chakra Petch\">Techno<\u002Fbutton><button data-v=\"monoton\" title=\"Monoton\">Neon<\u002Fbutton><button data-v=\"marker\" title=\"Permanent Marker\">Scrawl<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"tw-sec\"><div class=\"tw-label\">Scanlines<\u002Fdiv><div class=\"tw-seg\" id=\"tw-scan\"><button data-v=\"on\">On<\u002Fbutton><button data-v=\"off\">Off<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"tw-sec\"><div class=\"tw-label\">Screen flicker<\u002Fdiv><div class=\"tw-seg\" id=\"tw-flicker\"><button data-v=\"on\">On<\u002Fbutton><button data-v=\"off\">Off<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <div class=\"tw-sec\"><div class=\"tw-label\">In-play alert<\u002Fdiv><div class=\"tw-seg\" id=\"tw-inplay\"><button data-v=\"on\">Red<\u002Fbutton><button data-v=\"off\">Off<\u002Fbutton><\u002Fdiv><div class=\"tw-hint\">turns the whole terminal red while your games are live<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // league channel select (single)\n  document.querySelectorAll('#chans .chan').forEach(b=>{\n    b.addEventListener('click',()=>{\n      document.querySelectorAll('#chans .chan').forEach(x=>x.setAttribute('aria-pressed', x===b));\n    });\n  });\n  // legs stepper\n  let legs=4; const lv=document.getElementById('legVal');\n  const setLegs=n=>{legs=Math.max(2,Math.min(6,n)); lv.textContent=String(legs).padStart(2,'0');};\n  document.getElementById('legUp').onclick=()=>setLegs(legs+1);\n  document.getElementById('legDown').onclick=()=>setLegs(legs-1);\n  // toggles\n  const flip=el=>el.setAttribute('aria-pressed', el.getAttribute('aria-pressed')!=='true');\n  const today=document.getElementById('todaySw');\n  today.addEventListener('click',()=>flip(today));\n  today.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();flip(today);}});\n  document.querySelectorAll('#tiers .tier').forEach(t=>{\n    t.addEventListener('click',()=>flip(t));\n    t.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();flip(t);}});\n  });\n  // decode reasoning + show-all + ask are wired via delegation in the backend script below\n  // (so they work for freshly-rendered live cards too).\n  // console <-> summary strip (expand only; real runs keep the console visible)\n  const strip=document.getElementById('strip'), cons=document.getElementById('console'), run=document.getElementById('run');\n  const expand=()=>{ strip.style.display='none'; cons.style.display='block'; };\n  strip.addEventListener('click',expand);\n  strip.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();expand();}});\n\n  // primary tabs\n  (function(){\n    const bS=document.getElementById('tabBtnSearch'), bT=document.getElementById('tabBtnToday');\n    const pS=document.getElementById('tabSearch'), pT=document.getElementById('tabToday');\n    function sel(which){\n      const today = which==='today';\n      bS.setAttribute('aria-selected', String(!today));\n      bT.setAttribute('aria-selected', String(today));\n      pS.hidden = today; pT.hidden = !today;\n      if(today && typeof loadLedger==='function') loadLedger();  // refresh on open\n    }\n    bS.addEventListener('click',()=>sel('search'));\n    bT.addEventListener('click',()=>sel('today'));\n  })();\n  // ask chat is wired via delegation in the backend script below.\n\n// ---- tweaks panel ----\n(function(){\n  const ACCENTS={\n    green:{grgb:'84,240,176',grn:'#54f0b0',hot:'#7dffcb',dim:'#2e6f57'},\n    amber:{grgb:'255,190,74',grn:'#ffbe4a',hot:'#ffd47a',dim:'#7a5c12'},\n    cyan:{grgb:'90,220,255',grn:'#5adcff',hot:'#9aecff',dim:'#1f5f75'},\n    magenta:{grgb:'255,110,200',grn:'#ff6ec8',hot:'#ff9bd9',dim:'#7d2f5f'}\n  };\n  const KEY='atombets-collider-tw';\n  const WMFONTS={\n    orbitron:{f:\"'Orbitron',sans-serif\",w:800,ls:'.02em',sz:'26px'},\n    chakra:{f:\"'Chakra Petch',sans-serif\",w:700,ls:'.01em',sz:'30px'},\n    monoton:{f:\"'Monoton',cursive\",w:400,ls:'.02em',sz:'26px'},\n    marker:{f:\"'Permanent Marker',cursive\",w:400,ls:'.01em',sz:'31px'}\n  };\n  const root=document.documentElement, body=document.body;\n  let s={accent:'green',scan:'on',flicker:'on',inplay:'off',wmfont:'orbitron'};\n  try{ s=Object.assign(s, JSON.parse(localStorage.getItem(KEY))||{}); }catch(e){}\n  const save=()=>{ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} };\n  const seg=(id,val)=>document.querySelectorAll('#'+id+' button').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.v===val)));\n  function apply(){\n    const a=ACCENTS[s.accent]||ACCENTS.green;\n    root.style.setProperty('--grgb',a.grgb); root.style.setProperty('--grn',a.grn);\n    root.style.setProperty('--grn-hot',a.hot); root.style.setProperty('--grn-dim',a.dim);\n    const wf=WMFONTS[s.wmfont]||WMFONTS.orbitron;\n    root.style.setProperty('--wm-font',wf.f); root.style.setProperty('--wm-weight',wf.w);\n    root.style.setProperty('--wm-spacing',wf.ls); root.style.setProperty('--wm-size',wf.sz);\n    body.classList.toggle('no-scan', s.scan==='off');\n    body.classList.toggle('no-flicker', s.flicker==='off');\n    body.classList.toggle('live', s.inplay==='on');\n    const sm=document.getElementById('stMode'), st=document.getElementById('stState');\n    if(sm) sm.textContent = s.inplay==='on'?'BETS':'BOARD';\n    if(st) st.textContent = s.inplay==='on'?'IN PLAY':'IDLE';\n    document.querySelectorAll('#tw-accent button').forEach(b=>b.setAttribute('aria-pressed', String(b.dataset.v===s.accent)));\n    seg('tw-wmfont',s.wmfont); seg('tw-scan',s.scan); seg('tw-flicker',s.flicker); seg('tw-inplay',s.inplay);\n  }\n  const acc=document.getElementById('tw-accent');\n  Object.keys(ACCENTS).forEach(k=>{ const b=document.createElement('button'); b.dataset.v=k; b.title=k;\n    b.style.background='rgb('+ACCENTS[k].grgb+')'; b.style.color='rgb('+ACCENTS[k].grgb+')';\n    b.onclick=()=>{ s.accent=k; save(); apply(); }; acc.appendChild(b); });\n  const bind=(id,prop)=>document.querySelectorAll('#'+id+' button').forEach(b=>b.onclick=()=>{ s[prop]=b.dataset.v; save(); apply(); });\n  bind('tw-wmfont','wmfont'); bind('tw-scan','scan'); bind('tw-flicker','flicker'); bind('tw-inplay','inplay');\n  const tw=document.getElementById('tw');\n  document.getElementById('tw-toggle').onclick=()=>tw.classList.toggle('open');\n  apply();\n})();\n\n// ---- parlay wager calculator ----\n(function(){\n  const stake=document.getElementById('stake'); if(!stake) return;\n  const M4=10.0, M3=1.75; // FLEX multipliers: 4/4 and 3/4\n  const fmt=v=>'$'+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});\n  function calc(){ const s=Math.max(0,parseFloat(stake.value)||0);\n    document.getElementById('pay4').textContent=fmt(s*M4);\n    document.getElementById('pay3').textContent=fmt(s*M3); }\n  stake.addEventListener('input',calc); calc();\n})();\n\n// ---- results gating: empty by default; demo only on explicit toggle ----\n(function(){\n  const empty=document.getElementById('empty'), results=document.getElementById('results'),\n        demo=document.getElementById('demoToggle');\n  if(!results) return;\n  const demoHTML=results.innerHTML;           // snapshot the original hardcoded demo board\n  const banner=()=>document.getElementById('demoBanner');\n  function show(isDemo){ if(empty) empty.style.display='none'; results.hidden=false;\n    const b=banner(); if(b) b.hidden=!isDemo; if(demo) demo.classList.toggle('on', !!isDemo);\n    document.body.classList.toggle('is-demo', !!isDemo); }\n  function reset(){ if(empty) empty.style.display=''; results.hidden=true;\n    results.innerHTML=demoHTML; const b=banner(); if(b) b.hidden=true;\n    if(demo) demo.classList.remove('on'); document.body.classList.remove('is-demo'); }\n  // Demo toggle: ONLY path that shows sample data. Restores the hardcoded demo board.\n  if(demo) demo.addEventListener('click', ()=>{ if(results.hidden){ results.innerHTML=demoHTML; show(true); } else reset(); });\n  // exposed so the live-run code can reveal a freshly-rendered real board\n  window.__results={ show, reset, results, empty };\n})();\n<\u002Fscript>\n\n<script>\n/* =====================================================================\n   ATOMBETS — live backend wiring (same-origin, atombets.netlify.app)\n   Endpoints:\n     POST /api/bet-finder-background   { jobId, league, legs, today, tiers }  -> empty 202 (no body)\n     GET  /api/bet-finder-status?jobId=…  -> { status, step, elapsedMs, typicalMs, phases, result }\n     GET  /api/top-picks?format=json   -> picks[]\n     POST /api/ask                     { pick, messages } -> { answer }\n   ===================================================================== */\n(function(){\n  // ---------- small helpers ----------\n  function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));}\n  function get(o,keys,d){ if(o==null) return d; for(const k of keys){ if(o[k]!=null) return o[k]; } return d; }\n  function initials(n){return String(n||'').split(/\\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'--';}\n  function hashN(s){let h=0;s=String(s||'x');for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}\n  function avatar(n){const h=hashN(n)%360;return 'background:linear-gradient(145deg,hsl('+h+' 55% 44%),hsl('+((h+20)%360)+' 60% 20%))';}\n  function pct(prob){ return (prob==null||isNaN(prob))?null:Math.round(prob*100); }   // prob is a DECIMAL 0-1\n  function confClass(p){ return p>=60?'hi':p>=53?'md':'lo'; }\n  function verdictOf(v){ v=String(v||'').toLowerCase();\n    return v==='play'?{cls:'play',label:'PLAY'}:v==='lean'?{cls:'lean',label:'LEAN'}:{cls:'pass',label:'PASS'}; }\n  function tierChip(oddsType){ const o=String(oddsType||'').toLowerCase();\n    const c=o==='demon'?'demon':o==='standard'?'standard':o==='goblin'?'goblin':''; return c?'<span class=\"tchip '+c+'\">'+c.toUpperCase()+'<\u002Fspan>':''; }\n  function photo(name,image,cls){ const st=avatar(name), t=esc(name||''), ini=esc(initials(name));\n    // Initials avatar is the base layer; the headshot <img> overlays it. On load failure\n    // onerror removes the <img> once (this.onerror=null guards against a fallback loop),\n    // silently — a missing headshot is expected, not an error — revealing the initials.\n    if(image) return '<span class=\"'+cls+'\" style=\"'+st+'\" title=\"'+t+'\">'+ini+'<img src=\"'+esc(image)+'\" alt=\"\" loading=\"lazy\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\" onerror=\"this.onerror=null;this.remove()\"><\u002Fspan>';\n    return '<span class=\"'+cls+'\" style=\"'+st+'\" title=\"'+t+'\">'+ini+'<\u002Fspan>'; }\n\n  // §8: hardcoded inline league map — stylized abbreviation chips, no external images.\n  // Add a league later = add one entry here.\n  const LEAGUES={\n    mlb:{ab:'MLB',g:'⚾',c:'#e0563f'},\n    nfl:{ab:'NFL',g:'🏈',c:'#c69a4a'},\n    nba:{ab:'NBA',g:'🏀',c:'#e07a2a'},\n    wnba:{ab:'WNBA',g:'🏀',c:'#e35a97'},\n    nhl:{ab:'NHL',g:'🏒',c:'#5a9bd8'},\n    soccer:{ab:'SOC',g:'⚽',c:'#3fb56b'},\n    world_cup:{ab:'WC',g:'⚽',c:'#3fb56b'},\n    ncaaf:{ab:'NCAAF',g:'🏈',c:'#b5842f'},\n    ncaab:{ab:'NCAAB',g:'🏀',c:'#c86a2a'},\n    tennis:{ab:'TEN',g:'🎾',c:'#b6d94a'},\n    golf:{ab:'PGA',g:'⛳',c:'#4ac0a0'},\n    mma:{ab:'MMA',g:'🥊',c:'#d94a4a'}\n  };\n  function leagueKey(tag){ return String(tag||'').toLowerCase().replace(/\\s+/g,'_'); }\n  function leagueBadge(tag){ if(!tag) return '';\n    const L=LEAGUES[leagueKey(tag)];\n    if(!L) return '<span class=\"lgb\" style=\"color:#8fa6a0\">'+esc(String(tag).toUpperCase())+'<\u002Fspan>';\n    return '<span class=\"lgb\" style=\"color:'+L.c+'\"><span class=\"lgg\">'+L.g+'<\u002Fspan>'+esc(L.ab)+'<\u002Fspan>'; }\n\n  function intel(p){ const bits=[];\n    if(p.oppSP&&p.oppSP.name){ const s=p.oppSP;\n      bits.push('Opp SP: '+s.name+(s.throws?' ('+s.throws+')':'')+[s.era!=null?s.era+' ERA':'',s.whip!=null?s.whip+' WHIP':'',s.k!=null?s.k+' K':''].filter(Boolean).map(x=>' · '+x).join('')); }\n    if(p.parkIndex!=null) bits.push('Park '+p.parkIndex);\n    if(p.teamRecord){ let t=(p.team?p.team+' ':'')+p.teamRecord; if(p.teamWinPct!=null) t+=' ('+p.teamWinPct+')'; bits.push(t); }\n    if(!bits.length) return '';\n    return '<div class=\"intel\">'+bits.map(esc).join('<span class=\"idot\">·<\u002Fspan>')+'<\u002Fdiv>'; }\n  function spark(arr){ if(!Array.isArray(arr)) return ''; const nums=arr.map(Number).filter(n=>!isNaN(n)); if(!nums.length) return '';\n    const mx=Math.max.apply(null,nums.concat([1])); return '<span class=\"spark\">'+nums.slice(-5).map(n=>'<i style=\"height:'+Math.max(8,Math.round(n/mx*100))+'%\"><\u002Fi>').join('')+'<\u002Fspan>'; }\n\n  // ---------- render: play card (exact fields from result.board picks) ----------\n  function slipKey(p){ return [String(p.player||''),String(p.stat||''),String(p.line==null?'':p.line)].join('|').toLowerCase(); }\n  function pickMeta(p){ return {player:p.player,stat:p.stat,line:p.line,verdict:p.verdict,prob:p.prob,oddsType:p.oddsType,\n    matchup:p.matchup,team:p.team,position:p.position,league:p.league,key_risk:p.key_risk,reasoning:p.reasoning,\n    image:p.image,loggedAt:p.loggedAt}; }\n  function playCard(p){\n    const prob=pct(p.prob), cc=prob!=null?confClass(prob):'md', vi=verdictOf(p.verdict);\n    const pos=[p.team,p.position,p.matchup].filter(Boolean).join(' · ');\n    const confLabel=prob==null?'':(prob>=60?'High confidence':prob>=53?'Medium confidence':'Lower confidence');\n    const rec=Array.isArray(p.recent5)?p.recent5:null;\n    const formLabel=rec?('Last 5: '+rec.join(',')+(p.recentAvg!=null?' · avg '+p.recentAvg:'')):'';\n    const meta=encodeURIComponent(JSON.stringify(pickMeta(p)));\n    const inSlip=SLIP.has(slipKey(p));\n    return '<article class=\"pk\" data-conf=\"'+cc+'\" data-pick=\"'+meta+'\" data-key=\"'+esc(slipKey(p))+'\">'\n      +'<div class=\"pk-top\">'+photo(p.player,p.image,'pk-photo')\n      +'<div class=\"pk-id\"><div class=\"pk-name\">'+esc(String(p.player||'').toUpperCase())+'<\u002Fdiv><div class=\"pk-pos\">'+esc(pos)+'<\u002Fdiv><\u002Fdiv>'\n      +leagueBadge(p.league)\n      +'<span class=\"pk-verd '+vi.cls+'\">'+vi.label+'<\u002Fspan><\u002Fdiv>'\n      +'<div class=\"pk-mid\"><div class=\"pk-prop\">Prop<b>'+esc(p.stat)+(p.line!=null?' <span class=\"ln\">Over '+esc(p.line)+'<\u002Fspan>':'')+'<\u002Fb><\u002Fdiv>'\n      +'<div class=\"pk-prob c-'+cc+'\"><span class=\"num\">'+(prob!=null?prob:'—')+'<\u002Fspan><span class=\"pctsign\">%<\u002Fspan><span class=\"conf\">'+esc(confLabel)+'<\u002Fspan><\u002Fdiv><\u002Fdiv>'\n      +((spark(rec)||formLabel)?('<div class=\"pk-form\">'+spark(rec)+'<span class=\"fl\">'+esc(formLabel)+'<\u002Fspan><\u002Fdiv>'):'')\n      +'<div class=\"pk-actions\">'\n        +'<button type=\"button\" class=\"miniact statsbtn\">▤ Stats<\u002Fbutton>'\n        +'<button type=\"button\" class=\"miniact decode2\">› Reasoning<\u002Fbutton>'\n        +'<span class=\"spacer\"><\u002Fspan>'\n        +'<button type=\"button\" class=\"miniact slipbtn\" data-slip aria-pressed=\"'+inSlip+'\"><span class=\"sbx\">Slip<\u002Fspan><\u002Fbutton>'\n      +'<\u002Fdiv>'\n      +'<div class=\"statsbox\"><\u002Fdiv>'\n      +'<div class=\"reason\"><span class=\"rk\">The read<\u002Fspan>'+esc(p.reasoning||'')\n      +intel(p)\n      +(p.key_risk?'<div class=\"risk\">⚠ key risk // '+esc(p.key_risk)+'<\u002Fdiv>':'')\n      +'<div class=\"ask\"><div class=\"ask-thread\"><\u002Fdiv><form class=\"ask-form\"><input class=\"ask-input\" type=\"text\" autocomplete=\"off\" placeholder=\"ask about this pick…\"><button type=\"submit\" class=\"ask-send\">Ask<\u002Fbutton><\u002Fform><\u002Fdiv>'\n      +'<\u002Fdiv><\u002Farticle>';\n  }\n\n  // ---------- render: recommended parlay slip (legs from result.parlayLegs) ----------\n  function parlaySlip(parlay, legs){\n    legs=Array.isArray(legs)?legs:[];\n    if(parlay && parlay.error){\n      return '<div class=\"rec\"><span class=\"rec-tag\">◈ RECOMMENDED SLIP<\u002Fspan>'\n        +'<div class=\"rec-head\"><span class=\"t\">No parlay<\u002Fspan><span class=\"meta\">FLEX<\u002Fspan><\u002Fdiv>'\n        +'<div class=\"rleg\" style=\"opacity:.85\"><span class=\"rw\"><span>'+esc(parlay.error)+'<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>';\n    }\n    if(!legs.length) return '';\n    const rows=legs.map((l,i)=>{\n      const pr=pct(l.prob);\n      return '<div class=\"rleg\"><span class=\"ri\">'+String(i+1).padStart(2,'0')+'<\u002Fspan>'\n        +'<span class=\"rw\"><b>'+esc(l.player)+'<\u002Fb> <span>'+esc(l.stat)+(l.line!=null?' · Over '+esc(l.line):'')+'<\u002Fspan><\u002Fspan>'\n        +tierChip(l.oddsType)+'<span class=\"rp\">'+(pr!=null?pr+'%':'')+'<\u002Fspan><\u002Fdiv>';\n    }).join('');\n    const combined=legs.reduce((a,l)=>a*(typeof l.prob==='number'?l.prob:1),1);\n    const cpct=legs.length?Math.round(combined*100):null;\n    const foot='<div class=\"rec-foot\">'\n      +'<div class=\"readout\"><div class=\"rk\">Legs<\u002Fdiv><div class=\"rv\">'+legs.length+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"readout\"><div class=\"rk\">Combined<\u002Fdiv><div class=\"rv\">'+(cpct!=null?cpct+'%':'—')+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n    return '<div class=\"rec\"><span class=\"rec-tag\">◈ RECOMMENDED SLIP<\u002Fspan>'\n      +'<div class=\"rec-head\"><span class=\"t\">'+legs.length+'-LEG PARLAY<\u002Fspan><span class=\"meta\">FLEX<\u002Fspan><\u002Fdiv>'\n      +rows+foot+'<\u002Fdiv>';\n  }\n\n  // ---------- verdict filter (display-only, §11c) ----------\n  function selectedVerdicts(){\n    const on=[].slice.call(document.querySelectorAll('#verdictSeg button[aria-pressed=\"true\"]')).map(b=>b.dataset.v);\n    return on.length?on:['play'];\n  }\n\n  // ---------- render: full board from a real result ----------\n  let LAST_RESULT=null;\n  function renderResult(result){\n    const R=window.__results&&window.__results.results; if(!R) return;\n    LAST_RESULT=result=result||{};\n    const board=Array.isArray(result.board)?result.board:[];\n    const all=(Array.isArray(result.allPicks)&&result.allPicks.length)?result.allPicks:board;\n    const sel=selectedVerdicts();\n    // §11c filter by verdict · §10 sort by prob DESCENDING\n    const picks=all.filter(p=>sel.indexOf(String(p.verdict||'').toLowerCase())>=0)\n                   .slice().sort((a,b)=>(b.prob||0)-(a.prob||0));\n    const totalPlays=all.filter(p=>String(p.verdict||'').toLowerCase()==='play').length;\n    const label=sel.length>=3?'All picks':sel.map(v=>v==='play'?'Plays':v==='lean'?'Leans':'Passes').join(' + ');\n    let html='<div id=\"demoBanner\" class=\"demo-banner\" hidden=\"\">⌺ Demo data — not a live run<\u002Fdiv>';\n    html+='<div class=\"rhead\">Your Board <span class=\"hr\"><\u002Fspan> '+totalPlays+' plays<\u002Fdiv>';\n    html+=parlaySlip(result.parlay, result.parlayLegs);\n    html+='<div class=\"rhead\">'+esc(label)+' <span class=\"hr\"><\u002Fspan> '+picks.length+' shown<\u002Fdiv>';\n    html+= picks.length ? picks.map(playCard).join('')\n         : '<div class=\"es-p\" style=\"margin:14px 0\">No picks match this filter — adjust <b>Show Verdicts<\u002Fb> above.<\u002Fdiv>';\n    R.innerHTML=html;\n    syncSlipButtons();\n  }\n  function rerenderResult(){ if(LAST_RESULT) renderResult(LAST_RESULT); }\n\n  // ---------- control state ----------\n  function readControls(){\n    const lb=document.querySelector('#chans .chan[aria-pressed=\"true\"]');\n    const leagueRaw=lb?(lb.dataset.l||lb.textContent.trim()):'MLB';\n    const league=leagueRaw.toLowerCase().replace(/\\s+/g,'_');   // \"World Cup\" -> \"world_cup\", \"MLB\" -> \"mlb\"\n    const today=document.getElementById('todaySw').getAttribute('aria-pressed')==='true';\n    const legs=parseInt(document.getElementById('legVal').textContent,10)||4;\n    const tiers=[].slice.call(document.querySelectorAll('#tiers .tier[aria-pressed=\"true\"]')).map(t=>\n      t.classList.contains('goblin')?'goblin':t.classList.contains('standard')?'standard':'demon');\n    const body={ league, legs, today, tiers };\n    // §11a/§11b — both optional; omit when unset\n    const sf=document.getElementById('propFilter'); if(sf && sf.value) body.statFilter=sf.value;\n    const mp=document.getElementById('maxPicks'); if(mp && mp.value) body.maxPicks=parseInt(mp.value,10);\n    return body;\n  }\n\n  // ---------- run status panel ----------\n  const RS=document.getElementById('runStatus');\n  function fmtT(ms){ ms=Math.max(0,ms|0); const s=Math.round(ms/1000); return s>=60?(Math.floor(s/60)+'m '+String(s%60).padStart(2,'0')+'s'):(s+'s'); }\n  function fmtSec(ms){ return Math.round((ms||0)/1000)+'s'; }\n  function statusMsg(msg,err){ RS.hidden=false; RS.classList.toggle('err',!!err); document.getElementById('rsStep').textContent=msg; }\n  // §2 — map the backend `step` to plain language\n  function plainStep(step){\n    const s=String(step||'').toLowerCase();\n    if(/pull|search|prop/.test(s)) return 'Searching picks…';\n    if(/gather|data|record|odds|form|start/.test(s)) return 'Gathering data…';\n    if(/lineup|research|claude/.test(s)) return 'Researching lineups…';\n    if(/judg|grad|verdict|scor/.test(s)) return 'Judging…';\n    if(/siz|parlay/.test(s)) return 'Sizing parlay…';\n    return step ? (String(step).charAt(0).toUpperCase()+String(step).slice(1)) : 'Working…';\n  }\n  function renderStatus(job){\n    RS.hidden=false; RS.classList.remove('err');\n    const step=get(job,['step','status'],'');\n    document.getElementById('rsStep').textContent=plainStep(step);\n    const el=job.elapsedMs||0, ty=job.typicalMs||0;\n    // §2.3 live timer · §2.4 typical estimate\n    document.getElementById('rsTimer').textContent=fmtT(el)+(ty?(' · typically ~'+fmtT(ty)):'');\n    const bar=document.getElementById('rsBar');\n    if(ty>0){ bar.style.width=Math.max(4,Math.min(100,Math.round(el/ty*100)))+'%'; }\n    else { bar.style.width=Math.max(4,Math.min(95,Math.round(el/1000/8/60*100)))+'%'; } // no typical yet: creep toward ~8min\n    // §2.2 completed phases as checkmarks with durations + active phase\n    const ph=Array.isArray(job.phases)?job.phases:[];\n    const done=ph.map(p=>{\n      const nm=(typeof p==='string')?p:get(p,['phase','name','label','step'],'');\n      const ms=(p&&typeof p==='object')?p.ms:null;\n      return '<div class=\"rs-phase done\"><span class=\"pmark\">✓<\u002Fspan><span>'+esc(nm)+(ms!=null?' · '+fmtSec(ms):'')+'<\u002Fspan><\u002Fdiv>';\n    }).join('');\n    const active = step ? '<div class=\"rs-phase active\"><span class=\"pmark\">▸<\u002Fspan><span>'+esc(String(step))+'…<\u002Fspan><\u002Fdiv>' : '';\n    document.getElementById('rsPhases').innerHTML=done+active;\n  }\n\n  // ---------- Find Bets: POST background then poll status ----------\n  const RUN=document.getElementById('run');\n  let ACTIVE=false, POLL=null, RUN_STARTED=0;\n  RUN.addEventListener('click', async function(){\n    if(ACTIVE) return;\n    const body=readControls();\n    ACTIVE=true; RUN.classList.add('busy');\n    // §3 — clear demo + any stale board the instant a run starts\n    if(window.__results) window.__results.reset();\n    document.body.classList.remove('is-demo');\n    RS.classList.remove('err'); RS.hidden=false;\n    document.getElementById('rsPhases').innerHTML='';\n    document.getElementById('rsTimer').textContent='';\n    document.getElementById('rsBar').style.width='4%';\n    statusMsg('Submitting run…',false);\n    RUN_STARTED=Date.now();\n    // 1) client-generated jobId, used in BOTH the POST body and the status query string\n    const jobId=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():('job-'+Date.now()+'-'+Math.random().toString(16).slice(2));\n    try{\n      // 2) POST to the Netlify BACKGROUND function. It returns an empty 202 (no body) — do NOT parse it.\n      const r=await fetch('/api/bet-finder-background',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({jobId},body))});\n      if(!(r.ok || r.status===202)) throw new Error('start failed (HTTP '+r.status+')');\n    }catch(err){ return fail('Could not start run — '+err.message); }\n    const started=Date.now(), TIMEOUT=12*60*1000;   // §1 — 12-minute poll window (Opus runs 5–8 min)\n    (async function tick(){\n      if(!ACTIVE) return;\n      if(Date.now()-started>TIMEOUT) return fail('Timed out after 12 min.');\n      try{\n        // 3) poll the status blob by jobId\n        const r=await fetch('/api/bet-finder-status?jobId='+encodeURIComponent(jobId));\n        const job=await r.json();\n        renderStatus(job);\n        const s=String(job.status||'').toLowerCase();\n        if(s==='done'){ return finish(job.result); }\n        if(s==='error'){ return fail((job.result&&(job.result.message||job.result.error))||job.message||job.step||'Run failed.'); }\n        // status==='running' (or blob not written yet) -> keep polling\n      }catch(err){ /* status may 404 / be empty until the job blob exists — keep polling */ }\n      POLL=setTimeout(tick,3000);\n    })();\n  });\n  function fail(msg){ ACTIVE=false; RUN.classList.remove('busy'); if(POLL)clearTimeout(POLL); statusMsg('⚠ '+msg,true); }\n  function finish(result){\n    ACTIVE=false; RUN.classList.remove('busy'); if(POLL)clearTimeout(POLL);\n    document.getElementById('rsBar').style.width='100%';\n    statusMsg('Finished in '+fmtT(Date.now()-RUN_STARTED),false);\n    renderResult(result);\n    if(window.__results) window.__results.show(false);\n    LEDGER_LOADED=false;                       // §3/§10 — force ledger to re-pull fresh next open\n    document.getElementById('todayCount').textContent='·';\n    setTimeout(()=>{ RS.hidden=true; },1600);\n  }\n  const cancel=document.getElementById('rsCancel');\n  if(cancel) cancel.addEventListener('click',()=>{ ACTIVE=false; if(POLL)clearTimeout(POLL); RUN.classList.remove('busy'); RS.hidden=true; });\n\n  // ---------- Today's Picks ledger (§4/§10): fetch fresh on every open, PLAYS only ----------\n  function ago(ts){ if(!ts && ts!==0) return ''; const t=typeof ts==='number'?ts:Date.parse(ts); if(isNaN(t)) return '';\n    const m=Math.round((Date.now()-t)/60000);\n    if(m<1) return 'just now'; if(m<60) return m+'m ago';\n    const h=Math.round(m/60); if(h<24) return h+'h ago'; return Math.round(h/24)+'d ago'; }\n  function ledgerRow(p){\n    const pr=pct(p.prob), pcls=pr!=null?confClass(pr):'lo';\n    const graded = p.hit===true ? '<span class=\"lage hit\">✓ HIT<\u002Fspan>'\n                 : p.hit===false ? '<span class=\"lage miss\">✗ MISS<\u002Fspan>'\n                 : '<span class=\"lage\">'+esc(ago(p.loggedAt))+'<\u002Fspan>';\n    const meta=encodeURIComponent(JSON.stringify(pickMeta(p)));\n    return '<div class=\"lrow\" data-key=\"'+esc(slipKey(p))+'\" data-pick=\"'+meta+'\">'\n      +photo(p.player,p.image,'lav')\n      +'<div class=\"lid\"><b>'+esc(p.player)+'<\u002Fb><small>'+esc(p.stat)+(p.line!=null?' · Over '+esc(p.line):'')+'<\u002Fsmall>'\n        +'<div style=\"display:flex;gap:6px;align-items:center;margin-top:4px\">'+leagueBadge(p.league)+tierChip(p.oddsType)+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"lmeta\"><span class=\"lprob c-'+pcls+'\">'+(pr!=null?pr+'%':'—')+'<\u002Fspan>'+graded\n        +'<button type=\"button\" class=\"reev\">re-evaluate ↻<\u002Fbutton><\u002Fdiv>'\n      +'<\u002Fdiv><div class=\"reev-note\" hidden=\"\"><\u002Fdiv>';\n  }\n  let LEDGER_LOADED=false, LEDGER_BUSY=false;\n  window.loadLedger=async function(){\n    const box=document.getElementById('ledger'); if(!box || LEDGER_BUSY) return;\n    LEDGER_BUSY=true;\n    box.innerHTML='<div class=\"ldr-empty\"><span class=\"spin\"><\u002Fspan> loading today\\'s ledger…<\u002Fdiv>';\n    try{\n      const r=await fetch('/api/top-picks?format=json');   // §10 — always fresh, never cached client-side\n      const data=await r.json();\n      let picks=Array.isArray(data)?data:(Array.isArray(data.picks)?data.picks:[]);\n      const date=(data&&data.date)||'';\n      picks=picks.filter(p=>String(p.verdict||'').toLowerCase()==='play');   // §10 — PLAYS only\n      document.getElementById('ledgerDate').textContent = date ? ('Ledger · '+date) : \"Today's ledger\";\n      const n=document.getElementById('todayCount'); if(n) n.textContent=picks.length||'0';\n      box.innerHTML = picks.length\n        ? picks.map(ledgerRow).join('')\n        : '<div class=\"ldr-empty\">No plays logged yet today.<br><b>Run a slate<\u002Fb> to start the ledger.<\u002Fdiv>';\n      LEDGER_LOADED=true;\n    }catch(err){ box.innerHTML='<div class=\"ldr-empty\">⚠ Could not load ledger<br><small>'+esc(err.message)+'<\u002Fsmall><\u002Fdiv>'; }\n    finally{ LEDGER_BUSY=false; }\n  };\n  const _lr=document.getElementById('ledgerRefresh'); if(_lr) _lr.addEventListener('click',()=>window.loadLedger());\n\n  // ==================================================================\n  //  §6 build-my-own slip · §5 re-evaluate · §12 stats · §11 filters\n  // ==================================================================\n  const SLIP=new Map();  // key -> pick (session-only; survives league switches + runs, §6.3)\n  function syncSlipButtons(){\n    document.querySelectorAll('[data-slip]').forEach(b=>{ const card=b.closest('[data-key]');\n      if(card) b.setAttribute('aria-pressed', String(SLIP.has(card.dataset.key))); });\n  }\n  function num(v){ return typeof v==='number'?v:(v!=null&&!isNaN(parseFloat(v))?parseFloat(v):null); }\n  function fmtEv(v){ v=num(v); return v==null?'—':((v>=0?'+':'')+v.toFixed(2)); }\n  function pickPath(o,paths){ for(const p of paths){ let cur=o,ok=true; for(const k of p.split('.')){ if(cur==null){ok=false;break;} cur=cur[k]; } if(ok&&cur!=null) return cur; } return null; }\n\n  let SIZE_SEQ=0;\n  async function sizeSlip(){\n    const legs=[].concat.apply([],[Array.from(SLIP.values())]);\n    const sizeBox=document.getElementById('slipSize'), distBox=document.getElementById('slipDist'), evb=document.getElementById('slipEv');\n    if(legs.length<2){ sizeBox.hidden=true; distBox.hidden=true; evb.textContent=legs.length?'add 1+ to size':''; return; }\n    const seq=++SIZE_SEQ; evb.innerHTML='<span class=\"spin\"><\u002Fspan>';\n    try{\n      // §6.5 — same payload shape the engine uses: legs with prob + oddsType\n      const payload={ legs: legs.map(l=>({player:l.player,stat:l.stat,line:l.line,prob:l.prob,oddsType:l.oddsType})) };\n      const r=await fetch('/api/bet-finder-size',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});\n      const d=await r.json(); if(seq!==SIZE_SEQ) return;\n      const flexEv=pickPath(d,['flex.evPerDollar','flexEvPerDollar','flex.ev','flexEv','evPerDollar','ev']);\n      const powerEv=pickPath(d,['power.evPerDollar','powerEvPerDollar','power.ev','powerEv']);\n      const combined=pickPath(d,['combinedProb','flex.hitProb','allHitProb','probAll']);\n      document.getElementById('slFlexEv').textContent=fmtEv(flexEv);\n      document.getElementById('slPowerEv').textContent=fmtEv(powerEv);\n      document.getElementById('slCombined').textContent = combined!=null\n        ? Math.round(num(combined)*100)+'%'\n        : Math.round(legs.reduce((a,l)=>a*(num(l.prob)||1),1)*100)+'%';\n      sizeBox.hidden=false;\n      const dist=pickPath(d,['distribution','hitDistribution','flex.distribution','payouts']);\n      if(Array.isArray(dist)&&dist.length){ distBox.hidden=false;\n        distBox.innerHTML='<b>Hit distribution<\u002Fb> · '+dist.map(x=>{\n          const hits=pickPath(x,['hits','k','n']), pr=pickPath(x,['prob','p','chance']);\n          return (hits!=null?hits+'/'+legs.length:'?')+(pr!=null?' '+Math.round(num(pr)*100)+'%':''); }).join(' · ');\n      } else distBox.hidden=true;\n      evb.textContent = flexEv!=null ? ('Flex '+fmtEv(flexEv)+'/$') : '';\n    }catch(err){ if(seq===SIZE_SEQ){ evb.textContent=''; sizeBox.hidden=false; document.getElementById('slFlexEv').textContent='⚠'; } }\n  }\n  function renderTray(){\n    const tray=document.getElementById('slipTray'), legsBox=document.getElementById('slipLegs'), title=document.getElementById('slipTitle');\n    const legs=Array.from(SLIP.values());\n    title.innerHTML='My Slip <span>· '+legs.length+' leg'+(legs.length===1?'':'s')+'<\u002Fspan>';\n    document.body.classList.toggle('tray-open', legs.length>0);\n    tray.classList.toggle('show', legs.length>0);\n    if(!legs.length){ tray.classList.remove('open');\n      legsBox.innerHTML=''; document.getElementById('slipSize').hidden=true; document.getElementById('slipDist').hidden=true;\n      document.getElementById('slipEv').textContent=''; return; }\n    legsBox.innerHTML=legs.map(l=>{\n      const pr=pct(l.prob), pcls=pr!=null?confClass(pr):'lo';\n      const age=l.loggedAt?(' · <span class=\"sl-age\">'+esc(ago(l.loggedAt))+'<\u002Fspan>'):''; // §6.6 run age per leg\n      return '<div class=\"sleg\" data-key=\"'+esc(slipKey(l))+'\">'\n        +'<div class=\"sl-id\"><b>'+esc(l.player)+'<\u002Fb><small>'+esc(l.stat)+(l.line!=null?' · Over '+esc(l.line):'')+' '+leagueBadge(l.league)+age+'<\u002Fsmall><\u002Fdiv>'\n        +'<span class=\"sl-p c-'+pcls+'\">'+(pr!=null?pr+'%':'')+'<\u002Fspan>'\n        +'<button type=\"button\" class=\"sl-x\" data-slipx aria-label=\"remove leg\">×<\u002Fbutton><\u002Fdiv>';\n    }).join('');\n    sizeSlip();\n  }\n  function toggleSlip(pick){ const k=slipKey(pick); if(SLIP.has(k)) SLIP.delete(k); else SLIP.set(k,pick); renderTray(); syncSlipButtons(); }\n  document.getElementById('slipBar').addEventListener('click',()=>{ if(SLIP.size) document.getElementById('slipTray').classList.toggle('open'); });\n  document.getElementById('slipClear').addEventListener('click',()=>{ SLIP.clear(); renderTray(); syncSlipButtons(); });\n  renderTray();  // init: tray stays hidden until a pick is added\n\n  // §12 — STATS (ESPN-direct): POST /api/player-stats { player, team?, league }\n  async function loadStats(card, box){\n    box.classList.add('open');\n    if(box.dataset.loaded) return;\n    const ctx=pickContext(card);\n    if(document.body.classList.contains('is-demo')){\n      box.innerHTML='<span class=\"rk\">Season stats<\u002Fspan><div class=\"sgrid\"><b><span>demo<\u002Fspan>—<\u002Fb><\u002Fdiv><div class=\"sasof\">(demo) live stats pull from ESPN on a real run<\u002Fdiv>';\n      box.dataset.loaded='1'; return; }\n    box.innerHTML='<span class=\"spin\"><\u002Fspan> pulling stats…';\n    try{\n      const r=await fetch('/api/player-stats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player:ctx.player,team:ctx.team,league:ctx.league})});\n      const d=await r.json(); const st=d.stats||{};\n      const fields=Object.keys(st).filter(k=>k!=='kind');\n      const grid=fields.length?fields.map(k=>'<b><span>'+esc(k)+'<\u002Fspan>'+esc(st[k])+'<\u002Fb>').join(''):'<b>no stats returned<\u002Fb>';\n      box.innerHTML='<span class=\"rk\">'+esc(st.kind||'Player stats')+'<\u002Fspan><div class=\"sgrid\">'+grid+'<\u002Fdiv>'\n        +(d.asOf?'<div class=\"sasof\">as of '+esc(d.asOf)+(d.source?' · '+esc(d.source):'')+'<\u002Fdiv>':'');\n      box.dataset.loaded='1';\n    }catch(err){ box.innerHTML='<span class=\"rk\">Player stats<\u002Fspan><div class=\"sgrid\"><b>⚠ '+esc(err.message)+'<\u002Fb><\u002Fdiv>'; }\n  }\n\n  // §5 — re-evaluate a logged pick\n  async function doReeval(btn){\n    const row=btn.closest('.lrow'); if(!row) return;\n    const note=(row.nextElementSibling&&row.nextElementSibling.classList.contains('reev-note'))?row.nextElementSibling:null;\n    const ctx=pickContext(row);\n    btn.disabled=true; btn.textContent='checking…';\n    if(note){ note.hidden=false; note.className='reev-note'; note.innerHTML='<span class=\"spin\"><\u002Fspan> web-searching for news…'; }\n    try{\n      const r=await fetch('/api/reevaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pick:ctx})});\n      const d=await r.json(); const u=d.updated||{}; const pr=pct(u.prob);\n      if(pr!=null){ const pe=row.querySelector('.lprob'); if(pe){ pe.textContent=pr+'%'; pe.className='lprob c-'+confClass(pr); } }\n      if(note){\n        if(u.changed){\n          const oldTxt=verdictOf(ctx.verdict).label.toLowerCase()+' '+(pct(ctx.prob)!=null?pct(ctx.prob)+'%':'');\n          const newTxt=verdictOf(u.verdict).label.toLowerCase()+' '+(pr!=null?pr+'%':'');\n          note.className='reev-note changed';\n          note.innerHTML='<b>updated:<\u002Fb> '+esc(oldTxt)+'<span class=\"arw\">→<\u002Fspan>'+esc(newTxt)+(u.changeNote?' — '+esc(u.changeNote):'');\n        } else { note.className='reev-note same'; note.textContent='still good ✓ (checked just now)'; }\n      }\n    }catch(err){ if(note){ note.className='reev-note'; note.textContent='⚠ re-evaluate failed: '+err.message; } }\n    finally{ btn.disabled=false; btn.textContent='re-evaluate ↻'; }\n  }\n\n  // §11a — league-aware prop filter (hardcoded per-league map)\n  const PROP_OPTIONS={\n    mlb:['Home Runs','Total Bases','Hits','Hits+Runs+RBIs','Strikeouts','RBIs','Stolen Bases'],\n    nba:['Points','Rebounds','Assists','Pts+Rebs+Asts','3-PT Made'],\n    wnba:['Points','Rebounds','Assists','Pts+Rebs+Asts','3-PT Made'],\n    nfl:['Passing Yards','Rushing Yards','Receiving Yards','Receptions','Touchdowns'],\n    ncaaf:['Passing Yards','Rushing Yards','Receiving Yards','Receptions','Touchdowns'],\n    soccer:['Shots','Shots On Target','Passes','Goalie Saves','Goals+Assists'],\n    world_cup:['Shots','Shots On Target','Passes','Goalie Saves','Goals+Assists']\n  };\n  function currentLeagueKey(){ const lb=document.querySelector('#chans .chan[aria-pressed=\"true\"]'); return leagueKey(lb?(lb.dataset.l||lb.textContent.trim()):'mlb'); }\n  function populatePropFilter(){ const sel=document.getElementById('propFilter'); if(!sel) return;\n    const opts=PROP_OPTIONS[currentLeagueKey()]||[]; const cur=sel.value;\n    sel.innerHTML='<option value=\"\">All props<\u002Foption>'+opts.map(o=>'<option value=\"'+esc(o)+'\">'+esc(o)+'<\u002Foption>').join('');\n    sel.value = opts.indexOf(cur)>=0 ? cur : '';\n  }\n  document.querySelectorAll('#chans .chan').forEach(b=>b.addEventListener('click',populatePropFilter));\n  populatePropFilter();\n\n  // §11c — verdict segmented filter (multi-select, keeps ≥1 on)\n  document.querySelectorAll('#verdictSeg button').forEach(b=>b.addEventListener('click',()=>{\n    const on=b.getAttribute('aria-pressed')==='true';\n    const active=document.querySelectorAll('#verdictSeg button[aria-pressed=\"true\"]').length;\n    if(on && active===1) return;\n    b.setAttribute('aria-pressed', String(!on));\n    rerenderResult();\n  }));\n\n  // ---------- delegated clicks (works for live-rendered + demo cards) ----------\n  function pickContext(card){\n    if(!card) return {};\n    if(card.dataset && card.dataset.pick){ try{ return JSON.parse(decodeURIComponent(card.dataset.pick)); }catch(e){} }\n    if(card.classList && card.classList.contains('pk')) return {\n      player:(card.querySelector('.pk-name')||{}).textContent||'',\n      matchup:(card.querySelector('.pk-pos')||{}).textContent||'',\n      stat:(card.querySelector('.pk-prop b')||{}).textContent||'',\n      prob:(card.querySelector('.pk-prob .num')||{}).textContent||''\n    };\n    return {};\n  }\n  document.addEventListener('click',function(e){\n    const t=e.target;\n    // reasoning toggle — live cards (.decode2) + demo cards (.decode)\n    const dec=t.closest&&t.closest('.decode,.decode2');\n    if(dec){ const pk=dec.closest('.pk'); if(pk){ const r=pk.querySelector('.reason');\n      const open=r.classList.toggle('open'); pk.classList.toggle('open',open);\n      dec.textContent=open?(dec.classList.contains('decode2')?'› Hide reasoning':'Hide reasoning'):(dec.classList.contains('decode2')?'› Reasoning':'Reasoning'); }\n      return; }\n    // demo show-all (leans/passes) — only present in the demo snapshot\n    const sa=t.closest&&t.closest('#showall');\n    if(sa){ const dn=document.getElementById('denser'); if(dn){ const open=dn.classList.toggle('open');\n      sa.innerHTML=(open?'▴ Hide leans &amp; passes ':'▾ Show leans &amp; passes ')+'<span class=\"cnt\">[ '+dn.querySelectorAll('.drow').length+' filtered ]<\u002Fspan>'; } return; }\n    // §12 stats\n    const sb=t.closest&&t.closest('.statsbtn');\n    if(sb){ const pk=sb.closest('.pk'); const box=pk&&pk.querySelector('.statsbox'); if(box){ if(box.classList.contains('open')) box.classList.remove('open'); else loadStats(pk,box); } return; }\n    // §6 slip toggle\n    const slb=t.closest&&t.closest('[data-slip]');\n    if(slb){ const card=slb.closest('[data-key]'); if(card) toggleSlip(pickContext(card)); return; }\n    // §6 slip leg remove\n    const sx=t.closest&&t.closest('[data-slipx]');\n    if(sx){ const leg=sx.closest('.sleg'); if(leg){ SLIP.delete(leg.dataset.key); renderTray(); syncSlipButtons(); } return; }\n    // §5 re-evaluate\n    const rv=t.closest&&t.closest('.reev');\n    if(rv){ doReeval(rv); return; }\n  });\n  document.addEventListener('submit',async function(e){\n    const f=e.target.closest&&e.target.closest('.ask-form'); if(!f) return;\n    e.preventDefault();\n    const inp=f.querySelector('.ask-input'); const q=(inp.value||'').trim(); if(!q) return;\n    const th=f.parentElement.querySelector('.ask-thread');\n    const u=document.createElement('div'); u.className='ask-msg user'; u.textContent=q; th.appendChild(u); inp.value='';\n    const b=document.createElement('div'); b.className='ask-msg bot'; b.textContent='thinking…'; th.appendChild(b);\n    const card=f.closest('.pk')||f.closest('.rec');\n    // demo cards never hit the network\n    if(document.body.classList.contains('is-demo')){\n      b.textContent=\"(demo) I'd weigh recent form, the matchup, and the line — live answers come from the model + web search.\"; return;\n    }\n    try{\n      const messages=[].slice.call(th.querySelectorAll('.ask-msg')).filter(m=>m!==b)\n        .map(m=>({role:m.classList.contains('user')?'user':'assistant',content:m.textContent}));\n      const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pick:pickContext(card),messages})});\n      const data=await r.json();\n      b.textContent=get(data,['answer','reply','text','content','message'],'')||'(no answer returned)';\n    }catch(err){ b.textContent='⚠ ask failed: '+err.message; }\n  });\n})();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
